<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Developer</title>
  </head>
  <body>
    <!-- HEADER -->

    <header class="header">
      <h2 class="header__title">Edgar Ayuso | Software Developer</h2>
      <button class="header__button">Hire Me</button>
    </header>

    <!-- MENU -->

    <nav class="side-menu">
      <input type="checkbox" id="open-menu" />
      <ul class="menu__list">
        <li class="list__item item--menu">
          <label for="open-menu" class="material-icons">menu</label>
        </li>
        <li class="list__item">
          <a><span class="material-icons">bolt</span>Skills</a>
        </li>
        <li class="list__item">
          <a><span class="material-icons">folder</span>Proyects</a>
        </li>
        <li class="list__item">
          <a><span class="material-icons">message</span>Contact</a>
        </li>
        <li class="list__item">
          <a><span class="material-icons">info</span>About Me</a>
        </li>

        <li class="list__item item--settings">
          <a><span class="material-icons">settings</span>Config</a>
        </li>
      </ul>
    </nav>
  </body>
</html>
